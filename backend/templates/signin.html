<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | TruVerify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/auth.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="orb orb-one" aria-hidden="true"></div>
    <div class="orb orb-two" aria-hidden="true"></div>

    <main class="auth-shell fade-in">
      <section class="auth-card">
        <p class="eyebrow">Welcome Back</p>
        <h1 class="auth-title">Sign In to TruVerify</h1>
        <p class="auth-subtitle">Access your credential verification workspace.</p>

        {% if error %}
        <p class="alert alert-error">{{ error }}</p>
        {% endif %}
        {% if message %}
        <p class="alert alert-info">{{ message }}</p>
        {% endif %}

        <form method="post" action="/signin" class="auth-form">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password" />
          </div>

          <button type="submit" class="cta auth-btn">Sign In</button>
        </form>

        <p class="auth-linkline">
          New here?
          <a href="/signup">Create an account</a>
        </p>
      </section>
    </main>
  </body>
</html>
