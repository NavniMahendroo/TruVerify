<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | TruVerify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/auth.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

    <main class="auth-shell fade-in">
      <section class="auth-card">
        <div class="auth-topbar">
          <a class="ghost-link" href="/">Back to Dashboard</a>
          <a class="ghost-link" href="/logout">Logout</a>
        </div>

        <p class="eyebrow">Account Settings</p>
        <h1 class="auth-title">Manage Profile</h1>
        <p class="auth-subtitle">Update your name or change your password.</p>

        {% if error %}
        <p class="alert alert-error">{{ error }}</p>
        {% endif %}
        {% if message %}
        <p class="alert alert-info">{{ message }}</p>
        {% endif %}

        <form method="post" action="/settings" class="auth-form">
          <div class="field">
            <label for="full_name">Full Name</label>
            <input id="full_name" name="full_name" type="text" required value="{{ user.full_name }}" autocomplete="name" />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" value="{{ user.email }}" disabled />
          </div>

          <hr class="auth-divider" />
          <p class="hint">To change password, fill all fields below. Leave blank to keep current password.</p>

          <div class="field">
            <label for="current_password">Current Password</label>
            <input id="current_password" name="current_password" type="password" autocomplete="current-password" />
          </div>

          <div class="field">
            <label for="new_password">New Password</label>
            <input id="new_password" name="new_password" type="password" minlength="8" autocomplete="new-password" />
          </div>

          <div class="field">
            <label for="confirm_new_password">Confirm New Password</label>
            <input id="confirm_new_password" name="confirm_new_password" type="password" minlength="8" autocomplete="new-password" />
          </div>

          <button type="submit" class="cta auth-btn">Save Settings</button>
        </form>
      </section>
    </main>
  </body>
</html>
