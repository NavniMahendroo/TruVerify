<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logged Out | TruVerify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/auth.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="orb orb-one" aria-hidden="true"></div>

    <main class="auth-shell fade-in">
      <section class="auth-card auth-centered">
        <p class="eyebrow">Session Ended</p>
        <h1 class="auth-title">You are logged out</h1>
        <p class="auth-subtitle">Your session has been cleared securely.</p>
        <div class="auth-actions">
          <a class="cta auth-link-btn" href="/signin">Sign In Again</a>
          <a class="ghost-link" href="/signup">Create New Account</a>
        </div>
      </section>
    </main>
  </body>
</html>
