<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | TruVerify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <link rel="stylesheet" href="/static/auth.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="orb orb-two" aria-hidden="true"></div>
    <div class="orb orb-three" aria-hidden="true"></div>

    <main class="auth-shell fade-in">
      <section class="auth-card">
        <p class="eyebrow">Create Account</p>
        <h1 class="auth-title">Sign Up for TruVerify</h1>
        <p class="auth-subtitle">Set up your access in under a minute.</p>

        {% if error %}
        <p class="alert alert-error">{{ error }}</p>
        {% endif %}
        {% if message %}
        <p class="alert alert-info">{{ message }}</p>
        {% endif %}

        <form method="post" action="/signup" class="auth-form">
          <div class="field">
            <label for="full_name">Full Name</label>
            <input id="full_name" name="full_name" type="text" required autocomplete="name" />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password" />
          </div>

          <div class="field">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" required minlength="8" autocomplete="new-password" />
          </div>

          <button type="submit" class="cta auth-btn">Create Account</button>
        </form>

        <p class="auth-linkline">
          Already have an account?
          <a href="/signin">Sign in</a>
        </p>
      </section>
    </main>
  </body>
</html>
